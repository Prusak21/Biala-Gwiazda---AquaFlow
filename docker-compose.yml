services:
  db:
    platform: linux/amd64
    image: postgis/postgis:16-3.4
    container_name: aquaflow_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    restart: unless-stopped

  web:
    build: .
    container_name: aquaflow_web
    ports:
      - "8080:8080" 
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

volumes:
  db_data:
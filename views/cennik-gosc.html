<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFlow - Cennik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #1a5276;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 42px;
        }
        .nav {
            background: white;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .nav a {
            color: #1a5276;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .info-box {
            background: #e8f0fe;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        .guest-badge {
            background: #ffc107;
            color: #333;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        th {
            background: #1a5276;
            color: white;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .cena {
            font-weight: bold;
            color: #1a5276;
        }
        .footer {
            background: #1a5276;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 50px;
        }
        .btn-back {
            background: #6c757d;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💧 AquaFlow</h1>
        <p>Cennik usług</p></h1>
    </div>
    <div class="nav">
        <a href="/">Strona główna</a>
        <a href="/cennik">Cennik</a>
        <a href="/komunikaty">Komunikaty</a>
        <a href="/logowanie">Zaloguj się</a>
    </div>
    <div class="container">
        <div class="info-box">
            <span class="guest-badge">Jesteś: Gość</span>
        </div>

        <table>
            <tr><th>Taryfa</th><th>Cena za m³</th><th>Okres</th></tr>
            <tr><td>Taryfa Gminna 2025</td><td class="cena">4,80 zł</td><td>01.01.2025 - 31.12.2025</td></tr>
            <tr><td>Taryfa Gminna 2026</td><td class="cena">5,50 zł</td><td>od 01.01.2026</td></tr>
        </table>

        <table>
            <tr><th>Opłata</th><th>Kwota</th></tr>
            <tr><td>Opłata abonamentowa</td><td class="cena">8,00 zł / miesiąc</td></tr>
            <tr><td>Opłata ściekowa</td><td class="cena">4,20 zł / m³</td></tr>
        </table>

        <div style="text-align: center;">
            <a href="/" class="btn-back"> Wróć</a>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 AquaFlow</p>
    </div>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFlow - Komunikacja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #1a5276;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        .nav {
            background: #2c3e50;
            padding: 0;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            display: inline-block;
        }
        .nav a:hover {
            background: #1a5276;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .admin-badge {
            background: #e74c3c;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: Arial;
        }
        textarea {
            resize: vertical;
        }
        button {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #219a52;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .komunikaty-lista {
            margin-top: 30px;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        .komunikat-item {
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }
        .komunikat-item:last-child {
            border-bottom: none;
        }
        .komunikat-tytul {
            font-weight: bold;
            color: #1a5276;
        }
        .btn-usun {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-back {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
        .footer {
            background: #1a5276;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AquaFlow - Komunikacja</h1>
        <a href="/wyloguj" class="logout-btn">Wyloguj</a>
    </div>

    <div class="nav">
        <a href="/admin">Dashboard</a>
        <a href="/admin/uzytkownicy">Użytkownicy i Role</a>
        <a href="/admin/biling">Moduł Bilingowy</a>
        <a href="/admin/analityka">Moduł Analityki</a>
        <a href="/admin/mapa">Mapa GIS</a>
        <a href="/admin/komunikacja">Komunikacja</a>
        <a href="/admin/cennik">Cennik</a>
    </div>

    <div class="container">
        <div class="admin-badge">Jesteś: Admin</div>

        <h2>Wyślij komunikat do mieszkańców</h2>

        <div class="form-group">
            <label>Temat</label>
            <input type="text" id="title" placeholder="np. Planowana przerwa w dostawie wody">
        </div>

        <div class="form-group">
            <label>Grupa odbiorców</label>
            <select id="recipient">
                <option value="all">Wszyscy mieszkańcy</option>
                <option value="srodmiescie">Tylko sektor Śródmieście</option>
                <option value="szczakowa">Tylko sektor Szczakowa</option>
            </select>
        </div>

        <div class="form-group">
            <label>Treść komunikatu</label>
            <textarea id="content" rows="6" placeholder="Treść Wiadomości"></textarea>
        </div>

        <button onclick="sendMessage()">Wyślij komunikat</button>

        <div id="message" class="message"></div>

        <div class="komunikaty-lista">
            <h3>Wysłane komunikaty</h3>
            <div id="komunikatyList"></div>
        </div>

        <a href="/admin" class="btn-back">← Wróć</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 AquaFlow - System Gospodarki Wodnej</p>
        <p>bok@aquaflow.jaworzno.pl | 32 123 45 67</p>
    </div>
    <script>
        function loadKomunikaty() {
            let komunikaty = localStorage.getItem('aquaflow_komunikaty');
            if (komunikaty) {
                komunikaty = JSON.parse(komunikaty);
            } else {
                komunikaty = [];
            }
            const listDiv = document.getElementById('komunikatyList');
            if (komunikaty.length === 0) {
                listDiv.innerHTML = '<p style="color: #666;">Brak wysłanych komunikatów.</p>';
                return;
            }
            let html = '';
            for (let i = 0; i < komunikaty.length; i++) {
                const k = komunikaty[i];
                let grupaTekst = '';
                if (k.grupa === 'all') grupaTekst = 'Wszyscy mieszkańcy';
                else if (k.grupa === 'srodmiescie') grupaTekst = 'Sektor Śródmieście';
                else grupaTekst = 'Sektor Szczakowa';
                html += `
                    <div class="komunikat-item">
                        <div class="komunikat-tytul">${k.tytul}</div>
                        <div class="komunikat-tresc">${k.tresc}</div>
                        <div class="komunikat-data" style="font-size:12px;color:#666;">Data: ${k.data} | Grupa: ${grupaTekst}</div>
                        <button class="btn-usun" onclick="usunKomunikat(${i})">Usuń</button>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        }
        function sendMessage() {
            const title = document.getElementById('title').value;
            const recipient = document.getElementById('recipient').value;
            const content = document.getElementById('content').value;
            if (!title || !content) {
                alert('Wypełnij temat i treść komunikatu!');
                return;
            }
            let komunikaty = localStorage.getItem('aquaflow_komunikaty');
            if (komunikaty) {
                komunikaty = JSON.parse(komunikaty);
            } else {
                komunikaty = [];
            }
            const nowy = {
                id: Date.now(),
                tytul: title,
                tresc: content,
                grupa: recipient,
                data: new Date().toLocaleString('pl-PL')
            };
            komunikaty.push(nowy);
            localStorage.setItem('aquaflow_komunikaty', JSON.stringify(komunikaty));
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message success';
            msgDiv.style.display = 'block';
            msgDiv.innerHTML = 'Komunikat został wysłany i zapisany!';
            setTimeout(function() {
                msgDiv.style.display = 'none';
            }, 3000);
            loadKomunikaty();
        }
        function usunKomunikat(index) {
            let komunikaty = localStorage.getItem('aquaflow_komunikaty');
            if (komunikaty) {
                komunikaty = JSON.parse(komunikaty);
                komunikaty.splice(index, 1);
                localStorage.setItem('aquaflow_komunikaty', JSON.stringify(komunikaty));
                loadKomunikaty();
            } 
        }
        loadKomunikaty();
    </script>
</body>
</html>

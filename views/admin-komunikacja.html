<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFlow - Komunikacja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #1a5276; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 20px; text-decoration: none; border-radius: 5px; }
        .nav { background: #2c3e50; padding: 0; }
        .nav a { color: white; text-decoration: none; padding: 15px 25px; display: inline-block; }
        .nav a:hover, .nav a.active { background: #1a5276; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .admin-badge { background: #e74c3c; color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: Arial; }
        textarea { resize: vertical; }
        
        button.btn-submit { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button.btn-submit:hover { background: #219a52; }
        
        .message { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .komunikaty-lista { margin-top: 40px; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .komunikaty-lista h3 { color: #1a5276; border-bottom: 2px solid #ffc107; padding-bottom: 10px; margin-bottom: 15px; }
        .komunikat-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .komunikat-item:last-child { border-bottom: none; }
        .komunikat-tytul { font-weight: bold; color: #2980b9; font-size: 18px; margin-bottom: 5px; }
        .komunikat-tresc { margin-bottom: 10px; color: #333; line-height: 1.5; }
        .komunikat-data { font-size: 12px; color: #7f8c8d; }
        
        .btn-usun { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 3px; cursor: pointer; margin-top: 10px; font-size: 12px; font-weight: bold; }
        .btn-usun:hover { background: #c0392b; }
        
        .btn-back { background: #6c757d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
        .footer { background: #1a5276; color: white; text-align: center; padding: 25px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>💧 AquaFlow - Komunikacja</h1>
        <a href="/wyloguj" class="logout-btn">Wyloguj</a>
    </div>

    <div class="nav">
        <a href="/admin">Dashboard</a>
        <a href="/admin/uzytkownicy">Użytkownicy i Role</a>
        <a href="/admin/biling">Moduł Bilingowy</a>
        <a href="/admin/analityka">Moduł Analityki</a>
        <a href="/admin/mapa">Mapa GIS</a>
        <a href="/admin/komunikacja" class="active">Komunikacja</a>
    </div>

    <div class="container">
        <div class="admin-badge">Jesteś: Admin / Urzędnik</div>

        <h2 style="color: #1a5276; margin-bottom: 20px;">Wyślij komunikat do mieszkańców</h2>

        <div id="statusMessage" class="message"></div>

        <form id="komunikatForm">
            <div class="form-group">
                <label>Temat komunikatu</label>
                <input type="text" id="title" placeholder="np. Planowana przerwa w dostawie wody" required>
            </div>

            <div class="form-group">
                <label>Grupa odbiorców (Zostanie dodana do tytułu)</label>
                <select id="recipient">
                    <option value="all">Wszyscy mieszkańcy</option>
                    <option value="srodmiescie">Tylko sektor: Śródmieście</option>
                    <option value="szczakowa">Tylko sektor: Szczakowa</option>
                </select>
            </div>

            <div class="form-group">
                <label>Treść komunikatu</label>
                <textarea id="content" rows="6" placeholder="Wpisz treść wiadomości, która pojawi się na profilach e-BOK..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Wyślij komunikat</button>
        </form>

        <div class="komunikaty-lista">
            <h3>Wysłane i aktywne komunikaty</h3>
            <div id="komunikatyList">
                <div style="text-align: center; color: #7f8c8d;">Ładowanie historii komunikatów...</div>
            </div>
        </div>

        <a href="/admin" class="btn-back">← Wróć do Panelu</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 AquaFlow - System Gospodarki Wodnej</p>
    </div>
    
    <script>
        // Funkcja do formatowania dat
        function formatujDate(dataZSerwera) {
            const data = new Date(dataZSerwera);
            return data.toLocaleDateString('pl-PL') + ' ' + data.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        }

        // Pobieranie i wyświetlanie komunikatów
        async function zaladujKomunikaty() {
            try {
                const odp = await fetch('/api/admin/komunikaty');
                if (!odp.ok) throw new Error('Błąd ładowania danych');
                
                const komunikaty = await odp.json();
                const listaDiv = document.getElementById('komunikatyList');
                listaDiv.innerHTML = '';

                if (komunikaty.length === 0) {
                    listaDiv.innerHTML = '<div style="text-align: center; color: #7f8c8d; font-style: italic;">Brak wysłanych komunikatów w systemie.</div>';
                    return;
                }

                komunikaty.forEach(k => {
                    const dataUtworzenia = formatujDate(k.created_at);
                    const dataWaznosci = new Date(k.valid_to).toLocaleDateString('pl-PL');

                    listaDiv.innerHTML += `
                        <div class="komunikat-item">
                            <div class="komunikat-tytul">${k.title}</div>
                            <div class="komunikat-tresc">${k.content}</div>
                            <div class="komunikat-data">Wysłano: ${dataUtworzenia} | Wygasa: ${dataWaznosci}</div>
                            <button class="btn-usun" onclick="usunKomunikat(${k.id})">🗑️ Usuń komunikat</button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById('komunikatyList').innerHTML = '<div style="color: red; text-align: center;">Nie udało się załadować listy komunikatów.</div>';
            }
        }

        // Wysyłanie nowego komunikatu
        document.getElementById('komunikatForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const recipient = document.getElementById('recipient').value;
            const content = document.getElementById('content').value;
            const msgBox = document.getElementById('statusMessage');

            try {
                const odp = await fetch('/api/admin/komunikaty', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, recipient, content })
                });

                const wynik = await odp.json();

                if (!odp.ok) throw new Error(wynik.error);

                // Sukces
                msgBox.className = 'message success';
                msgBox.innerText = '✅ ' + wynik.message;
                msgBox.style.display = 'block';
                
                // Czyszczenie formularza i przeładowanie listy
                document.getElementById('komunikatForm').reset();
                zaladujKomunikaty();
                
                // Ukrycie komunikatu po 3 sekundach
                setTimeout(() => msgBox.style.display = 'none', 3000);

            } catch (err) {
                msgBox.className = 'message error';
                msgBox.innerText = '❌ ' + err.message;
                msgBox.style.display = 'block';
            }
        });

        // Usuwanie komunikatu
        async function usunKomunikat(id) {
            if (!confirm('Czy na pewno chcesz usunąć ten komunikat z systemu? Zniknie on z paneli mieszkańców.')) return;

            try {
                const odp = await fetch(`/api/admin/komunikaty/${id}`, { method: 'DELETE' });
                const wynik = await odp.json();
                
                if (!odp.ok) throw new Error(wynik.error);
                
                zaladujKomunikaty(); // Przeładowanie po pomyślnym usunięciu
            } catch (err) {
                alert('Błąd usuwania: ' + err.message);
            }
        }

        // Inicjalizacja przy starcie strony
        document.addEventListener('DOMContentLoaded', zaladujKomunikaty);
    </script>
</body>
</html>
